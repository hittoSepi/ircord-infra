events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    # Upstream for directory service
    upstream directory {
        server directory:3000;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name directory.ircord.dev chat.ircord.dev;
        return 301 https://$server_name$request_uri;
    }

    # Directory Service API
    server {
        listen 443 ssl http2;
        server_name directory.ircord.dev;

        ssl_certificate /etc/nginx/ssl/directory.ircord.dev.crt;
        ssl_certificate_key /etc/nginx/ssl/directory.ircord.dev.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # API endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://directory;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            
            # Handle preflight
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Health check
        location /api/health {
            proxy_pass http://directory/api/health;
            access_log off;
        }
    }

    # Landing Page
    server {
        listen 443 ssl http2;
        server_name chat.ircord.dev;

        ssl_certificate /etc/nginx/ssl/chat.ircord.dev.crt;
        ssl_certificate_key /etc/nginx/ssl/chat.ircord.dev.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/landing;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 6M;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Handle SPA routing
        location / {
            try_files $uri $uri/ /index.html;
            limit_req zone=general burst=50 nodelay;
        }
    }
}
