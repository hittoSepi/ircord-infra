services:
  # IRCord Directory Service
  directory:
    build:
      context: ./ircord-directory
      dockerfile: Dockerfile
    container_name: ircord-directory
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - directory-data:/app/data
    networks:
      - ircord-network

  # IRCord Landing Page (static files)
  landing:
    image: nginx:alpine
    container_name: ircord-landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./ircord-landing:/usr/share/nginx/html:ro
      - ./nginx/static-site.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ircord-network


volumes:
  directory-data:

networks:
  ircord-network:
    driver: bridge
