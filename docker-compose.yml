services:
  # IRCord Directory Service
  directory:
    build:
      context: ./ircord-directory
      dockerfile: Dockerfile
    container_name: ircord-directory
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - directory-data:/app/data
    networks:
      - ircord-network

  # IRCord Landing Page (static files)
  landing:
    image: nginx:alpine
    container_name: ircord-landing
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./ircord-landing:/usr/share/nginx/html:ro
      - ./nginx/static-site.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ircord-network

  # Nginx reverse proxy (optional, for production with SSL)
  nginx:
    image: nginx:alpine
    container_name: ircord-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./ircord-landing:/usr/share/nginx/html/landing:ro
    depends_on:
      - directory
    networks:
      - ircord-network
    profiles:
      - production

volumes:
  directory-data:

networks:
  ircord-network:
    driver: bridge
